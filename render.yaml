services:
  - type: web
    name: ct-app
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ct-db
          property: connectionString
      - key: AUTH_USER
        sync: false
      - key: AUTH_PASS
        sync: false

databases:
  - name: ct-db
    plan: free
    region: oregon
    databaseName: centros_transferencia
